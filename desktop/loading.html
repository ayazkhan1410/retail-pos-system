<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SmartShop POS</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: linear-gradient(145deg, #0f172a 0%, #1e293b 50%, #0f766e 120%);
      color: #f8fafc;
    }
    .card {
      width: min(420px, 92vw);
      padding: 2.5rem 2rem;
      border-radius: 1.25rem;
      background: rgba(15, 23, 42, 0.72);
      border: 1px solid rgba(148, 163, 184, 0.2);
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.35);
      text-align: center;
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.35rem;
    }
    .subtitle {
      color: #94a3b8;
      font-size: 0.9rem;
      margin-bottom: 2rem;
    }
    .ring-wrap {
      position: relative;
      width: 7rem;
      height: 7rem;
      margin: 0 auto 1.5rem;
    }
    .ring-wrap svg {
      width: 100%;
      height: 100%;
      transform: rotate(-90deg);
    }
    .ring-bg { stroke: rgba(148, 163, 184, 0.25); }
    .ring-fg {
      stroke: #14b8a6;
      stroke-linecap: round;
      transition: stroke-dasharray 0.45s ease;
    }
    .percent {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.35rem;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
    }
    .status {
      font-size: 0.95rem;
      font-weight: 500;
      margin-bottom: 0.75rem;
      min-height: 1.4rem;
    }
    .bar {
      height: 0.5rem;
      border-radius: 999px;
      background: rgba(148, 163, 184, 0.2);
      overflow: hidden;
    }
    .bar-fill {
      height: 100%;
      width: 0%;
      border-radius: inherit;
      background: linear-gradient(90deg, #14b8a6, #2dd4bf);
      transition: width 0.45s ease;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>SmartShop POS</h1>
    <p class="subtitle">Starting your point of sale…</p>
    <div class="ring-wrap">
      <svg viewBox="0 0 100 100" aria-hidden="true">
        <circle class="ring-bg" cx="50" cy="50" r="42" fill="none" stroke-width="8" />
        <circle id="ring" class="ring-fg" cx="50" cy="50" r="42" fill="none" stroke-width="8" stroke-dasharray="0 264" />
      </svg>
      <div id="percent" class="percent">0%</div>
    </div>
    <p id="status" class="status">Preparing services…</p>
    <div class="bar"><div id="bar" class="bar-fill"></div></div>
  </div>
  <script>
    const circumference = 264;
    window.setLoadingProgress = function setLoadingProgress(percent, message) {
      const clamped = Math.min(100, Math.max(0, Math.round(percent)));
      document.getElementById('percent').textContent = clamped + '%';
      document.getElementById('bar').style.width = clamped + '%';
      document.getElementById('ring').setAttribute(
        'stroke-dasharray',
        (clamped / 100) * circumference + ' ' + circumference,
      );
      if (message) {
        document.getElementById('status').textContent = message;
      }
    };
  </script>
</body>
</html>
